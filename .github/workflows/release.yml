name: Release

env:
  BUN_VERSION: "1.3.10"

on:
  push:
    branches:
      - "*"
    tags:
      - 'v*.*.*'

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  unit-tests:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: |
          chmod +x ./run-tests.sh
          ./run-tests.sh

  compile:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Compile TypeScript
        run: bun run compile

  write-lock-tests:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install media processing tools
        run: |
          echo "Installing ImageMagick, ffmpeg, and tree via apt..."
          sudo apt update
          sudo apt install -y imagemagick ffmpeg tree

      - name: Run write lock smoke tests
        working-directory: ./apps/cli
        run: |
          mkdir -p write-lock-test-logs
          ./write-lock-smoke-test.sh 2>&1 | tee write-lock-test-logs/write-lock-tests-output.log
          WRITE_LOCK_EXIT_CODE=${PIPESTATUS[0]}
          echo "Write lock tests exit code: $WRITE_LOCK_EXIT_CODE"
          echo "Write lock tests exit code: $WRITE_LOCK_EXIT_CODE" >> write-lock-test-logs/write-lock-tests-output.log
          exit $WRITE_LOCK_EXIT_CODE

  sync-tests:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install media processing tools
        run: |
          echo "Installing ImageMagick, ffmpeg, and tree via apt..."
          sudo apt update
          sudo apt install -y imagemagick ffmpeg tree

      - name: Run sync smoke tests
        working-directory: ./apps/cli
        run: |
          ./sync-smoke-test.sh

  smoke-test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install media processing tools
        run: |
          echo "Installing ImageMagick, ffmpeg, and tree via apt..."
          sudo apt update
          sudo apt install -y imagemagick ffmpeg tree

      - name: Install keychain tools (Linux)
        run: |
          sudo apt-get install -y libsecret-tools gnome-keyring dbus-x11

      - name: Start keyring daemon (Linux)
        run: |
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV
          eval $(gnome-keyring-daemon --unlock --components=secrets <<< "ci-test-password")
          echo "GNOME_KEYRING_CONTROL=$GNOME_KEYRING_CONTROL" >> $GITHUB_ENV

      - name: Run smoke tests
        working-directory: ./apps/cli
        run: |
          mkdir -p smoke-test-logs
          ./smoke-tests.sh 2>&1 | tee smoke-test-logs/smoke-tests-output.log
          SMOKE_TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "Smoke tests exit code: $SMOKE_TEST_EXIT_CODE"
          echo "Smoke tests exit code: $SMOKE_TEST_EXIT_CODE" >> smoke-test-logs/smoke-tests-output.log
          exit $SMOKE_TEST_EXIT_CODE

  smoke-test-encrypted:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install media processing tools
        run: |
          echo "Installing ImageMagick, ffmpeg, and tree via apt..."
          sudo apt update
          sudo apt install -y imagemagick ffmpeg tree

      - name: Run encrypted smoke tests
        working-directory: ./apps/cli
        run: |
          mkdir -p smoke-test-logs
          ./smoke-tests-encrypted.sh all 2>&1 | tee smoke-test-logs/smoke-tests-encrypted-output.log
          ENCRYPTED_EXIT_CODE=${PIPESTATUS[0]}
          echo "Encrypted smoke tests exit code: $ENCRYPTED_EXIT_CODE"
          echo "Encrypted smoke tests exit code: $ENCRYPTED_EXIT_CODE" >> smoke-test-logs/smoke-tests-encrypted-output.log
          exit $ENCRYPTED_EXIT_CODE

  lan-share-smoke-test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run LAN share smoke tests
        working-directory: ./apps/cli
        run: |
          mkdir -p smoke-test-logs
          ./smoke-tests-lan-share.sh 2>&1 | tee smoke-test-logs/lan-share-tests-output.log
          LAN_SHARE_EXIT_CODE=${PIPESTATUS[0]}
          echo "LAN share smoke tests exit code: $LAN_SHARE_EXIT_CODE"
          echo "LAN share smoke tests exit code: $LAN_SHARE_EXIT_CODE" >> smoke-test-logs/lan-share-tests-output.log
          exit $LAN_SHARE_EXIT_CODE

  build-linux:
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set config
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            IS_NIGHTLY="false"
          else
            TIMESTAMP=$(date -u +"%Y%m%dT%H%M%S")
            VERSION="dev-nightly.$TIMESTAMP"
            IS_NIGHTLY="true"
          fi
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_HASH="${{ github.sha }}"
          {
            echo '// Version is set by the CI build process. "dev" is used for local development.'
            echo 'export const version = "'"$VERSION"'";'
            echo ""
            echo "// Build metadata is set by the CI build process."
            echo "export const buildMetadata = {"
            echo '    commitHash: "'"$COMMIT_HASH"'",'
            echo '    buildDate: "'"$BUILD_DATE"'",'
            echo "    isNightly: $IS_NIGHTLY,"
            echo "};"
          } > packages/config/src/index.ts
          echo "Config set to:"
          cat packages/config/src/index.ts

      - name: Verify runner architecture
        run: |
          echo "Architecture: $(uname -m)"
          echo "Processor: $(uname -p)"
          lscpu | grep Architecture

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install media processing tools
        run: |
          echo "Installing ImageMagick, ffmpeg, and tree via apt..."
          sudo apt update
          sudo apt install -y imagemagick ffmpeg tree
          
      - name: Verify media tool versions
        run: |
          echo "=== Media Tool Versions ==="
          echo ""
          echo "ImageMagick (convert):"
          convert --version | head -1
          echo ""
          echo "ImageMagick (identify):"
          identify --version | head -1
          echo ""
          echo "ffmpeg:"
          ffmpeg -version | head -1
          echo ""
          echo "ffprobe:"
          ffprobe -version | head -1
          echo ""
          
      - name: Build Linux executable
        working-directory: ./apps/cli
        run: |
          bun run build-linux
          chmod +x bin/x64/linux/psi
          
      - name: Build mk CLI executable
        working-directory: ./apps/mk-cli
        run: |
          bun run build-linux
          chmod +x bin/x64/linux/mk
          
      - name: Build bdb CLI executable
        working-directory: ./apps/bdb-cli
        run: |
          bun run build-linux
          chmod +x bin/x64/linux/bdb
          
      - name: Test version command
        working-directory: ./apps/cli
        run: |
          echo "Testing version command after building..."
          ./bin/x64/linux/psi version

      - name: Run smoke tests
        working-directory: ./apps/cli
        run: |
          mkdir -p smoke-test-logs
          ./smoke-tests.sh --binary 2>&1 | tee smoke-test-logs/smoke-tests-output.log
          SMOKE_TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "Smoke tests exit code: $SMOKE_TEST_EXIT_CODE"
          echo "Smoke tests exit code: $SMOKE_TEST_EXIT_CODE" >> smoke-test-logs/smoke-tests-output.log
          exit $SMOKE_TEST_EXIT_CODE

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: photosphere-cli-linux-x64
          path: ./apps/cli/bin/x64/linux/psi

  build-windows:
    timeout-minutes: 20
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set config
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            IS_NIGHTLY="false"
          else
            TIMESTAMP=$(date -u +"%Y%m%dT%H%M%S")
            VERSION="dev-nightly.$TIMESTAMP"
            IS_NIGHTLY="true"
          fi
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_HASH="${{ github.sha }}"
          {
            echo '// Version is set by the CI build process. "dev" is used for local development.'
            echo 'export const version = "'"$VERSION"'";'
            echo ""
            echo "// Build metadata is set by the CI build process."
            echo "export const buildMetadata = {"
            echo '    commitHash: "'"$COMMIT_HASH"'",'
            echo '    buildDate: "'"$BUILD_DATE"'",'
            echo "    isNightly: $IS_NIGHTLY,"
            echo "};"
          } > packages/config/src/index.ts
          echo "Config set to:"
          cat packages/config/src/index.ts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install media processing tools
        run: |
          echo "Installing ImageMagick, ffmpeg, and tree via Chocolatey..."
          choco install imagemagick ffmpeg tree -y

      - name: Verify media tool versions
        run: |
          echo "=== Media Tool Versions ==="
          echo ""
          echo "ImageMagick (magick):"
          magick --version | Select-Object -First 1
          echo ""
          echo "ImageMagick (convert):"
          magick convert --version | Select-Object -First 1
          echo ""
          echo "ffmpeg:"
          ffmpeg -version 2>&1 | Select-Object -First 1
          echo ""
          echo "ffprobe:"
          ffprobe -version 2>&1 | Select-Object -First 1
          echo ""

      - name: Build Windows executable
        working-directory: ./apps/cli
        run: |
          bun run build-win
          
      - name: Build mk CLI executable
        working-directory: ./apps/mk-cli
        run: |
          bun run build-win
          
      - name: Build bdb CLI executable
        working-directory: ./apps/bdb-cli
        run: |
          bun run build-win
          
      - name: Test version command
        working-directory: ./apps/cli
        run: |
          echo "Testing version command after building..."
          ./bin/x64/win/psi.exe version

      - name: Run smoke tests
        working-directory: ./apps/cli
        shell: bash
        run: |
          mkdir -p smoke-test-logs
          ./smoke-tests.sh --binary 2>&1 | tee smoke-test-logs/smoke-tests-output.log
          SMOKE_TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "Smoke tests exit code: $SMOKE_TEST_EXIT_CODE"
          echo "Smoke tests exit code: $SMOKE_TEST_EXIT_CODE" >> smoke-test-logs/smoke-tests-output.log
          exit $SMOKE_TEST_EXIT_CODE

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: photosphere-cli-windows-x64
          path: ./apps/cli/bin/x64/win/psi.exe

  build-windows-baseline:
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set config
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            IS_NIGHTLY="false"
          else
            TIMESTAMP=$(date -u +"%Y%m%dT%H%M%S")
            VERSION="dev-nightly.$TIMESTAMP"
            IS_NIGHTLY="true"
          fi
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_HASH="${{ github.sha }}"
          {
            echo '// Version is set by the CI build process. "dev" is used for local development.'
            echo 'export const version = "'"$VERSION"'";'
            echo ""
            echo "// Build metadata is set by the CI build process."
            echo "export const buildMetadata = {"
            echo '    commitHash: "'"$COMMIT_HASH"'",'
            echo '    buildDate: "'"$BUILD_DATE"'",'
            echo "    isNightly: $IS_NIGHTLY,"
            echo "};"
          } > packages/config/src/index.ts
          echo "Config set to:"
          cat packages/config/src/index.ts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build Windows executable
        working-directory: ./apps/cli
        run: |
          bun run build-win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: photosphere-cli-windows-x64-baseline
          path: ./apps/cli/bin/x64/win/psi.exe

  build-macos-x64:
    timeout-minutes: 20
    runs-on: macos-15-intel # x64 architecture
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set config
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            IS_NIGHTLY="false"
          else
            TIMESTAMP=$(date -u +"%Y%m%dT%H%M%S")
            VERSION="dev-nightly.$TIMESTAMP"
            IS_NIGHTLY="true"
          fi
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_HASH="${{ github.sha }}"
          {
            echo '// Version is set by the CI build process. "dev" is used for local development.'
            echo 'export const version = "'"$VERSION"'";'
            echo ""
            echo "// Build metadata is set by the CI build process."
            echo "export const buildMetadata = {"
            echo '    commitHash: "'"$COMMIT_HASH"'",'
            echo '    buildDate: "'"$BUILD_DATE"'",'
            echo "    isNightly: $IS_NIGHTLY,"
            echo "};"
          } > packages/config/src/index.ts
          echo "Config set to:"
          cat packages/config/src/index.ts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Verify runner architecture
        run: |
          echo "Architecture: $(uname -m)"
          echo "Processor: $(uname -p)"
          echo "OS Version: $(sw_vers)"

      - name: Install dependencies
        run: bun install

      - name: Install media processing tools
        run: |
          echo "Installing ImageMagick, ffmpeg, and tree via Homebrew..."
          brew install imagemagick ffmpeg tree

      - name: Verify media tool versions
        run: |
          echo "=== Media Tool Versions ==="
          echo ""
          echo "ImageMagick (magick):"
          magick --version | head -1 || echo "magick command not found"
          echo ""
          echo "ImageMagick (convert):"
          convert --version | head -1 || echo "convert command not found"
          echo ""
          echo "ffmpeg:"
          ffmpeg -version | head -1
          echo ""
          echo "ffprobe:"
          ffprobe -version | head -1
          echo ""

      - name: Build macOS executable
        working-directory: ./apps/cli
        run: |
          bun run build-mac-x64
          chmod +x bin/x64/mac/psi
          
      - name: Build mk CLI executable
        working-directory: ./apps/mk-cli
        run: |
          bun run build-mac-x64
          chmod +x bin/x64/mac/mk
          
      - name: Build bdb CLI executable
        working-directory: ./apps/bdb-cli
        run: |
          bun run build-mac-x64
          chmod +x bin/x64/mac/bdb
          
      - name: Test built version command
        working-directory: ./apps/cli
        run: |
          echo "Testing version command after building..."
          ./bin/x64/mac/psi version

      - name: Run smoke tests
        working-directory: ./apps/cli
        run: |
          mkdir -p smoke-test-logs
          ./smoke-tests.sh --binary 2>&1 | tee smoke-test-logs/smoke-tests-output.log
          SMOKE_TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "Smoke tests exit code: $SMOKE_TEST_EXIT_CODE"
          echo "Smoke tests exit code: $SMOKE_TEST_EXIT_CODE" >> smoke-test-logs/smoke-tests-output.log
          exit $SMOKE_TEST_EXIT_CODE

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: photosphere-cli-macos-x64
          path: ./apps/cli/bin/x64/mac/psi

  build-macos-arm64:
    timeout-minutes: 20
    runs-on: macos-latest # ARM64 architecture
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set config
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            IS_NIGHTLY="false"
          else
            TIMESTAMP=$(date -u +"%Y%m%dT%H%M%S")
            VERSION="dev-nightly.$TIMESTAMP"
            IS_NIGHTLY="true"
          fi
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_HASH="${{ github.sha }}"
          {
            echo '// Version is set by the CI build process. "dev" is used for local development.'
            echo 'export const version = "'"$VERSION"'";'
            echo ""
            echo "// Build metadata is set by the CI build process."
            echo "export const buildMetadata = {"
            echo '    commitHash: "'"$COMMIT_HASH"'",'
            echo '    buildDate: "'"$BUILD_DATE"'",'
            echo "    isNightly: $IS_NIGHTLY,"
            echo "};"
          } > packages/config/src/index.ts
          echo "Config set to:"
          cat packages/config/src/index.ts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Get lockfile hash
        id: lockfile-hash
        run: |
          HASH=$(shasum -a 256 bun.lock | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ steps.lockfile-hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Verify runner architecture
        run: |
          echo "Architecture: $(uname -m)"
          echo "Processor: $(uname -p)"
          echo "OS Version: $(sw_vers)"

      - name: Install dependencies
        run: bun install

      - name: Install media processing tools
        run: |
          echo "Installing ImageMagick, ffmpeg, and tree via Homebrew..."
          brew install imagemagick ffmpeg tree

      - name: Verify media tool versions
        run: |
          echo "=== Media Tool Versions ==="
          echo ""
          echo "ImageMagick (magick):"
          magick --version | head -1 || echo "magick command not found"
          echo ""
          echo "ImageMagick (convert):"
          convert --version | head -1 || echo "convert command not found"
          echo ""
          echo "ffmpeg:"
          ffmpeg -version | head -1
          echo ""
          echo "ffprobe:"
          ffprobe -version | head -1
          echo ""

      - name: Build macOS ARM64 executable
        working-directory: ./apps/cli
        run: |
          bun run build-mac-arm64
          chmod +x bin/arm64/mac/psi
          
      - name: Build mk CLI executable
        working-directory: ./apps/mk-cli
        run: |
          bun run build-mac-arm64
          chmod +x bin/arm64/mac/mk
          
      - name: Build bdb CLI executable
        working-directory: ./apps/bdb-cli
        run: |
          bun run build-mac-arm64
          chmod +x bin/arm64/mac/bdb
          
      - name: Test version command
        working-directory: ./apps/cli
        run: |
          echo "Testing version command after building..."
          ./bin/arm64/mac/psi version

      - name: Run smoke tests
        working-directory: ./apps/cli
        run: |
          mkdir -p smoke-test-logs
          ./smoke-tests.sh --binary 2>&1 | tee smoke-test-logs/smoke-tests-output.log
          SMOKE_TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "Smoke tests exit code: $SMOKE_TEST_EXIT_CODE"
          echo "Smoke tests exit code: $SMOKE_TEST_EXIT_CODE" >> smoke-test-logs/smoke-tests-output.log
          exit $SMOKE_TEST_EXIT_CODE

      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: photosphere-cli-macos-arm64
          path: ./apps/cli/bin/arm64/mac/psi

  electron-smoke-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb imagemagick ffmpeg

      - name: Run Electron smoke tests
        working-directory: ./apps/desktop
        # --sequential: prevents multiple Electron instances competing on the same xvfb virtual display
        run: xvfb-run -a ./smoke-tests.sh --sequential

  build-desktop:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            files: |
              apps/desktop/release/*.deb
              apps/desktop/release/*.zip
          - os: windows-latest
            files: |
              apps/desktop/release/*.exe
              apps/desktop/release/*.zip
          - os: macos-15-intel
            files: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*.zip
          - os: macos-latest
            files: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set config
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            IS_NIGHTLY="false"
            DESKTOP_PACKAGE_VERSION="$VERSION"
          else
            TIMESTAMP=$(date -u +"%Y%m%dT%H%M%S")
            VERSION="dev-nightly.$TIMESTAMP"
            IS_NIGHTLY="true"
            # electron-builder requires semver in package.json; keep dev-nightly.* in config only.
            DESKTOP_PACKAGE_VERSION="0.0.0-nightly.$TIMESTAMP"
          fi
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_HASH="${{ github.sha }}"
          {
            echo '// Version is set by the CI build process. "dev" is used for local development.'
            echo 'export const version = "'"$VERSION"'";'
            echo ""
            echo "// Build metadata is set by the CI build process."
            echo "export const buildMetadata = {"
            echo '    commitHash: "'"$COMMIT_HASH"'",'
            echo '    buildDate: "'"$BUILD_DATE"'",'
            echo "    isNightly: $IS_NIGHTLY,"
            echo "};"
          } > packages/config/src/index.ts
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "DESKTOP_PACKAGE_VERSION=$DESKTOP_PACKAGE_VERSION" >> $GITHUB_ENV
          echo "Config set to:"
          cat packages/config/src/index.ts

      - name: Set desktop package.json version (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          jq ".version = \"${{ env.DESKTOP_PACKAGE_VERSION }}\"" apps/desktop/package.json > apps/desktop/package.tmp.json && mv apps/desktop/package.tmp.json apps/desktop/package.json
          echo "Desktop package.json version set to: ${{ env.DESKTOP_PACKAGE_VERSION }} (app config version: ${{ env.VERSION }})"

      - name: Set desktop package.json version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $json = Get-Content apps/desktop/package.json | ConvertFrom-Json
          $json.version = "${{ env.DESKTOP_PACKAGE_VERSION }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content apps/desktop/package.json
          Write-Host "Desktop package.json version set to: ${{ env.DESKTOP_PACKAGE_VERSION }} (app config version: ${{ env.VERSION }})"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Build Electron app
        run: bun run build

      - name: Show release directory contents
        run: |
          echo "Release directory structure:"
          ls apps/desktop/release

      - name: Install Xvfb (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run Electron smoke tests against binary (Linux)
        if: runner.os == 'Linux'
        working-directory: ./apps/desktop
        run: xvfb-run -a ./smoke-tests.sh --binary --sequential

      - name: Run Electron smoke tests against binary (Not Linux)
        if: runner.os != 'Linux'
        working-directory: ./apps/desktop
        run: ./smoke-tests.sh --binary --sequential

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: photosphere-desktop-${{ matrix.os }}-build
          path: ${{ matrix.files }}
          if-no-files-found: warn
          retention-days: 2

  create-release:
    timeout-minutes: 20
    needs: [compile, unit-tests, build-linux, build-windows, build-windows-baseline, build-macos-x64, build-macos-arm64, build-desktop, smoke-test, smoke-test-encrypted, write-lock-tests, sync-tests, lan-share-smoke-test, electron-smoke-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: photosphere-cli-linux-x64
          path: ./artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: photosphere-cli-windows-x64
          path: ./artifacts/windows

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: photosphere-cli-windows-x64-baseline
          path: ./artifacts/windows-baseline

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: photosphere-cli-macos-x64
          path: ./artifacts/macos-x64

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: photosphere-cli-macos-arm64
          path: ./artifacts/macos-arm64

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: photosphere-desktop-*-build
          path: ./artifacts/desktop
          merge-multiple: true

      - name: Create compressed archives
        run: |
          cd ./artifacts/linux && chmod +x psi && tar -czf ../photosphere-cli-linux-x64.tar.gz psi && cd ../..
          cd ./artifacts/windows && zip ../photosphere-cli-windows-x64.zip psi.exe && cd ../..
          cd ./artifacts/windows-baseline && zip ../photosphere-cli-windows-x64-baseline.zip psi.exe && cd ../..
          cd ./artifacts/macos-x64 && chmod +x psi && tar -czf ../photosphere-cli-macos-x64.tar.gz psi && cd ../..
          cd ./artifacts/macos-arm64 && chmod +x psi && tar -czf ../photosphere-cli-macos-arm64.tar.gz psi && cd ../..

      - name: Generate release notes
        id: release-notes
        run: |
          # Get the latest non-nightly tag (excluding current tag if this is a tagged build)
          if [ "${{ github.ref_type }}" == "tag" ]; then
            # For tagged releases, get commits since the previous tag (excluding current and nightly tags)
            PREVIOUS_TAG=$(git tag --list --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | grep -v "^nightly$" | head -1)
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Generating release notes for tagged release since previous tag: $PREVIOUS_TAG"
              COMMIT_RANGE="${PREVIOUS_TAG}..HEAD"
            else
              echo "No previous tag found, using all commits for tagged release"
              COMMIT_RANGE=""
            fi
          else
            # For nightly builds, get commits since the last non-nightly tag
            LAST_TAG=$(git tag --list --sort=-version:refname | grep -v "^nightly$" | head -1)
            if [ -n "$LAST_TAG" ]; then
              echo "Generating release notes for nightly build since last tag: $LAST_TAG"
              COMMIT_RANGE="${LAST_TAG}..HEAD"
            else
              echo "No previous tag found, using all commits for nightly build"
              COMMIT_RANGE=""
            fi
          fi
          
          # Get commits that start with "cli:" and process them
          if [ -n "$COMMIT_RANGE" ]; then
            RAW_COMMITS=$(git log --oneline --no-merges "$COMMIT_RANGE" --format="%s" --grep="^cli:")
          else
            RAW_COMMITS=$(git log --oneline --no-merges --format="%s" --grep="^cli:")
          fi
          
          # Process commits: filter for "cli:" prefix, remove prefix, trim whitespace, and format as bullet points
          RELEASE_NOTES=""
          if [ -n "$RAW_COMMITS" ]; then
            RELEASE_NOTES=$(echo "$RAW_COMMITS" | while IFS= read -r commit; do
              if [[ $commit == cli:* ]]; then
                # Remove "cli:" prefix and trim leading/trailing whitespace
                cleaned=$(echo "${commit#cli:}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                if [ -n "$cleaned" ]; then
                  echo "- $cleaned"
                fi
              fi
            done)
          fi
          
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="- No CLI-related commits found"
          fi
          
          # Save release notes to output and file
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "Generated release notes:"
          echo "$RELEASE_NOTES"

      - name: Delete existing nightly release
        if: github.ref_type != 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
          name: ${{ github.ref_type == 'tag' && format('Photosphere {0}', github.ref_name) || 'Photosphere Nightly' }}
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }}
          files: |
            ./artifacts/photosphere-cli-linux-x64.tar.gz
            ./artifacts/photosphere-cli-windows-x64.zip
            ./artifacts/photosphere-cli-windows-x64-baseline.zip
            ./artifacts/photosphere-cli-macos-x64.tar.gz
            ./artifacts/photosphere-cli-macos-arm64.tar.gz
            ./artifacts/desktop/**/*
          body: |
            ${{ github.ref_type == 'tag' && format('Photosphere release {0}', github.ref_name) || format('Photosphere nightly build - {0}', github.sha) }}

            ${{ github.ref_type != 'tag' && '⚠️ **This is a nightly build and may be unstable**' || '' }}
            ${{ github.ref_type != 'tag' && format('Built from commit: {0}', github.sha) || '' }}

            ## What's Changed
            ${{ steps.release-notes.outputs.RELEASE_NOTES }}

            ## CLI Download
            - **Linux**: `photosphere-cli-linux-x64.tar.gz`
            - **Windows modern**: `photosphere-cli-windows-x64.zip` (for modern processors, try this one first)
            - **Windows baseline**: `photosphere-cli-windows-x64-baseline.zip` (for older processors, try this one next)
            - **macOS (Intel)**: `photosphere-cli-macos-x64.tar.gz`
            - **macOS (Apple Silicon)**: `photosphere-cli-macos-arm64.tar.gz`

            ## CLI Installation
            1. Download the appropriate file for your platform
            2. Extract the archive
            3. Make the binary executable (Linux/macOS): `chmod +x psi`
            4. Move to your PATH or run directly

            ## Desktop Download
            - **Linux**: `.deb` package or `.zip`
            - **Windows**: `.exe` installer or `.zip`
            - **macOS**: `.dmg` disk image or `.zip`